<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Messenger — Dr. Gomon Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;
      --border:#2e2e2e;--text:#f0f0f0;--text2:#888;
      --accent:#E1306C;--accent2:#c2185b;--ig:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
    .screen{display:none;height:100vh}
    .screen.active{display:flex}

    /* LOGIN */
    #screen-login{flex-direction:column;align-items:center;justify-content:center;gap:20px}
    .login-icon{width:72px;height:72px;background:var(--ig);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:36px}
    .login-title{font-size:24px;font-weight:700}
    .login-sub{color:var(--text2);font-size:14px;text-align:center;max-width:300px;line-height:1.5}
    .btn-ig{display:flex;align-items:center;gap:12px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .2s}
    .btn-ig:hover{opacity:.88}
    .btn-ig svg{width:22px;height:22px;flex-shrink:0}

    /* MESSENGER */
    #screen-messenger{flex-direction:row;overflow:hidden}
    .sidebar{width:300px;min-width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface)}
    .sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .ig-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--surface2)}
    .sidebar-title{font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .btn-sm{background:none;border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:12px;padding:4px 10px;border-radius:6px;transition:color .2s,border-color .2s;white-space:nowrap}
    .btn-sm:hover{color:var(--text);border-color:var(--text2)}
    .sidebar-search{padding:10px 12px;border-bottom:1px solid var(--border)}
    .sidebar-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:14px;outline:none}
    .sidebar-search input:focus{border-color:var(--accent)}
    .conv-list{flex:1;overflow-y:auto}
    .conv-item{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
    .conv-item:hover{background:var(--surface2)}
    .conv-item.active{background:#2a1525}
    .conv-avatar img{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--surface2)}
    .conv-info{flex:1;min-width:0}
    .conv-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conv-last{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .conv-time{font-size:11px;color:var(--text2);flex-shrink:0}
    .empty{padding:40px 20px;text-align:center;color:var(--text2);font-size:14px;line-height:1.6}

    /* CHAT */
    .chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    #chatEmpty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);gap:14px}
    #chatEmpty svg{opacity:.25}
    #chatEmpty p{font-size:15px}
    #chatThread{display:none;flex-direction:column;flex:1;min-height:0}
    .chat-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);flex-shrink:0}
    .chat-header img{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--surface2)}
    .chat-header-name{font-weight:600;font-size:15px}
    .chat-header-sub{font-size:12px;color:var(--text2)}
    .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;min-height:0}
    .msg-row{display:flex;align-items:flex-end;gap:8px}
    .msg-row.out{flex-direction:row-reverse}
    .msg-row img{width:28px;height:28px;border-radius:50%;flex-shrink:0;object-fit:cover;background:var(--surface2)}
    .msg-bubble{max-width:64%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.45;word-break:break-word}
    .msg-row.in .msg-bubble{background:var(--surface2);border-bottom-left-radius:4px}
    .msg-row.out .msg-bubble{background:var(--accent2);border-bottom-right-radius:4px;color:#fff}
    .msg-time{font-size:10px;color:var(--text2);flex-shrink:0;padding:0 2px}
    .chat-input-row{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;background:var(--surface);flex-shrink:0}
    .chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--text);font-size:14px;resize:none;outline:none;max-height:120px;overflow-y:auto;font-family:inherit;line-height:1.4}
    .chat-input:focus{border-color:var(--accent)}
    .chat-input::placeholder{color:var(--text2)}
    .btn-send{width:40px;height:40px;background:var(--accent);border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .1s}
    .btn-send:hover{background:var(--accent2)}
    .btn-send:active{transform:scale(.94)}
    .btn-send:disabled{opacity:.4;cursor:not-allowed}

    .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:24px auto}
    @keyframes spin{to{transform:rotate(360deg)}}

    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1e1e;border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999}
    #toast.show{opacity:1}

    @media(max-width:680px){
      .sidebar{width:100%;min-width:unset;border-right:none}
      .chat-main{display:none}
      #screen-messenger.chat-open .sidebar{display:none}
      #screen-messenger.chat-open .chat-main{display:flex}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-icon">💬</div>
  <div class="login-title">Instagram Messenger</div>
  <div class="login-sub">Адмін-панель повідомлень Dr. Gomon Cosmetology.<br>Увійдіть через Instagram для доступу до DM.</div>
  <button class="btn-ig" onclick="igLogin()">
    <svg viewBox="0 0 24 24" fill="white"><rect x="2" y="2" width="20" height="20" rx="5" fill="none" stroke="white" stroke-width="2"/><circle cx="12" cy="12" r="4.5" fill="none" stroke="white" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="white"/></svg>
    Увійти через Instagram
  </button>
</div>

<!-- MESSENGER -->
<div id="screen-messenger" class="screen">
  <div class="sidebar">
    <div class="sidebar-header">
      <img class="ig-avatar" id="igAvatar" src="" alt="">
      <div class="sidebar-title" id="igName">Instagram</div>
      <button class="btn-sm" onclick="refreshConvs()">↻</button>
      <button class="btn-sm" onclick="logout()">Вийти</button>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Пошук діалогу…" oninput="filterConvs(this.value)">
    </div>
    <div class="conv-list" id="convList"></div>
  </div>

  <div class="chat-main">
    <div id="chatEmpty">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Оберіть діалог або надішліть напряму</p>
      <div style="display:flex;gap:8px;align-items:center;max-width:400px;width:100%;padding:0 16px">
        <input type="text" id="directIgsid" placeholder="Instagram Scoped ID отримувача" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;outline:none">
        <button class="btn-sm" onclick="openDirectChat()" style="padding:10px 16px">Відкрити</button>
      </div>
    </div>

    <div id="chatThread" style="display:none">
      <div class="chat-header">
        <img id="chatAvatar" src="" alt="">
        <div>
          <div class="chat-header-name" id="chatName"></div>
          <div class="chat-header-sub">Instagram Direct</div>
        </div>
        <button id="btnBack" class="btn-sm" style="margin-left:auto;display:none" onclick="backToList()">← Назад</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="replyInput" placeholder="Написати повідомлення…" rows="1"
          oninput="autoResize(this)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply()}"></textarea>
        <button class="btn-send" id="btnSend" onclick="sendReply()" title="Надіслати">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const IG_APP_ID    = '847955297878760';
const IG_REDIRECT  = 'https://gomonclinic.com/messenger/';
const IG_SCOPES    = 'instagram_business_basic,instagram_business_manage_messages';

const state = {
  token: null,
  igUserId: null,
  activeConvIdx: null,
  convs: []
};

// ── HELPERS ───────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function avatar(name) {
  return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44"><rect width="44" height="44" rx="22" fill="#333"/><text x="22" y="28" text-anchor="middle" fill="#888" font-size="18" font-family="sans-serif">' + (name||'?')[0].toUpperCase() + '</text></svg>');
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000 && d.getDate() === now.getDate()) return d.toLocaleTimeString('uk-UA', {hour:'2-digit',minute:'2-digit'});
  if (diff < 604800000) return d.toLocaleDateString('uk-UA', {weekday:'short'});
  return d.toLocaleDateString('uk-UA', {day:'numeric',month:'short'});
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function renderMsg(text) {
  return esc(text).replace(/\n/g, '<br>').replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:#E1306C">$1</a>');
}

// ── AUTH ──────────────────────────────────────────────────────────────────
function igLogin() {
  const params = new URLSearchParams({
    client_id:     IG_APP_ID,
    redirect_uri:  IG_REDIRECT,
    response_type: 'code',
    scope:         IG_SCOPES,
  });
  window.location.href = 'https://api.instagram.com/oauth/authorize?' + params.toString();
}

function logout() {
  sessionStorage.removeItem('ig_token');
  sessionStorage.removeItem('ig_user_id');
  state.token = state.igUserId = null;
  state.convs = [];
  showScreen('screen-login');
}

async function initAuth() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    history.replaceState({}, '', window.location.pathname);
    showScreen('screen-login');
    document.querySelector('.btn-ig').disabled = true;
    document.querySelector('.btn-ig').textContent = 'Авторизація…';
    try {
      const r = await fetch('/messenger/auth.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      });
      const data = await r.json();
      if (data.error) throw new Error(typeof data.error === 'object' ? data.error.message : data.error);
      state.token = data.access_token;
      state.igUserId = data.user_id ? String(data.user_id) : null;
      sessionStorage.setItem('ig_token', data.access_token);
      if (state.igUserId) sessionStorage.setItem('ig_user_id', state.igUserId);
      enterMessenger();
    } catch(e) {
      showScreen('screen-login');
      document.querySelector('.btn-ig').disabled = false;
      document.querySelector('.btn-ig').innerHTML = '<svg viewBox="0 0 24 24" fill="white" width="22" height="22"><rect x="2" y="2" width="20" height="20" rx="5" fill="none" stroke="white" stroke-width="2"/><circle cx="12" cy="12" r="4.5" fill="none" stroke="white" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="white"/></svg> Увійти через Instagram';
      toast('Помилка авторизації: ' + e.message);
    }
    return;
  }

  const saved = sessionStorage.getItem('ig_token');
  if (saved) {
    state.token = saved;
    state.igUserId = sessionStorage.getItem('ig_user_id');
    enterMessenger();
    return;
  }

  showScreen('screen-login');
}

async function enterMessenger() {
  showScreen('screen-messenger');
  document.getElementById('chatEmpty').style.display  = 'flex';
  document.getElementById('chatThread').style.display = 'none';

  // Load profile
  try {
    const me = await igGraph('/me?fields=user_id,name,username,profile_picture_url');
    document.getElementById('igAvatar').src = me.profile_picture_url || avatar(me.name || me.username);
    document.getElementById('igName').textContent = me.name || me.username || 'Instagram';
    if (me.user_id) state.igUserId = String(me.user_id);
  } catch(e) {
    document.getElementById('igName').textContent = 'Dr. Gomon';
  }

  loadConversations();
}

// ── INSTAGRAM GRAPH API ──────────────────────────────────────────────────
async function igGraph(path) {
  const sep = path.includes('?') ? '&' : '?';
  const r = await fetch('https://graph.instagram.com/v25.0' + path + sep + 'access_token=' + state.token);
  const data = await r.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return data;
}

// ── CONVERSATIONS ────────────────────────────────────────────────────────
async function loadConversations() {
  const el = document.getElementById('convList');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await igGraph('/me/conversations?platform=instagram&fields=id,name,participants,messages.limit(1){message,from,created_time}');
    state.convs = (data.data || []).map(c => {
      const parts = c.participants?.data || [];
      const other = parts.find(p => p.id !== state.igUserId) || parts[0] || {};
      const last = c.messages?.data?.[0];
      return {
        id: c.id,
        name: other.name || other.username || c.name || 'Без імені',
        participantId: other.id || '',
        pic: '',
        lastMsg: last?.message || '',
        lastTime: last ? formatTime(last.created_time) : ''
      };
    });
    renderConvList();
  } catch(e) {
    el.innerHTML = '<div class="empty">Помилка: ' + esc(e.message) + '<br><br><button class="btn-sm" onclick="loadConversations()">Спробувати ще</button></div>';
  }
}

function refreshConvs() { loadConversations(); }

function renderConvList(filter) {
  const el = document.getElementById('convList');
  let convs = state.convs;
  if (filter) convs = convs.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));
  if (!convs.length) { el.innerHTML = '<div class="empty">Немає розмов</div>'; return; }
  el.innerHTML = convs.map((c, i) =>
    '<div class="conv-item ' + (state.activeConvIdx===i?'active':'') + '" onclick="openConv(' + i + ')">' +
    '<div class="conv-avatar"><img src="' + esc(c.pic||avatar(c.name)) + '" alt=""></div>' +
    '<div class="conv-info"><div class="conv-name">' + esc(c.name) + '</div>' +
    '<div class="conv-last">' + esc(c.lastMsg) + '</div></div>' +
    '<div class="conv-time">' + esc(c.lastTime) + '</div></div>'
  ).join('');
}

function filterConvs(q) { renderConvList(q); }

// ── OPEN CONVERSATION ────────────────────────────────────────────────────
async function openConv(idx) {
  state.activeConvIdx = idx;
  const conv = state.convs[idx];

  document.getElementById('chatEmpty').style.display  = 'none';
  document.getElementById('chatThread').style.display = 'flex';
  document.getElementById('chatName').textContent     = conv.name;
  document.getElementById('chatAvatar').src           = conv.pic || avatar(conv.name);
  document.getElementById('btnBack').style.display    = 'block';
  document.getElementById('screen-messenger').classList.add('chat-open');
  renderConvList();

  const el = document.getElementById('chatMessages');
  el.innerHTML = '<div class="spinner" style="margin:40px auto"></div>';

  try {
    const data = await igGraph('/' + conv.id + '?fields=messages{message,from,created_time}');
    const msgs = (data.messages?.data || []).reverse();

    el.innerHTML = '';
    if (!msgs.length) { el.innerHTML = '<div class="empty">Немає повідомлень</div>'; return; }

    for (const m of msgs) {
      const isOut = m.from?.id === state.igUserId;
      const pic = isOut ? document.getElementById('igAvatar').src : avatar(conv.name);
      el.insertAdjacentHTML('beforeend',
        '<div class="msg-row ' + (isOut?'out':'in') + '">' +
        '<img src="' + esc(pic) + '" alt="">' +
        '<div class="msg-bubble">' + renderMsg(m.message||'[медіа]') + '</div>' +
        '<div class="msg-time">' + formatTime(m.created_time) + '</div></div>'
      );
    }
    el.scrollTop = el.scrollHeight;
  } catch(e) {
    el.innerHTML = '<div class="empty">Помилка: ' + esc(e.message) + '</div>';
  }
}

function backToList() {
  document.getElementById('screen-messenger').classList.remove('chat-open');
  document.getElementById('chatEmpty').style.display  = 'flex';
  document.getElementById('chatThread').style.display = 'none';
  state.directRecipient = null;
  state.activeConvIdx = null;
}

// ── DIRECT CHAT (without conversations API) ─────────────────────────────
function openDirectChat() {
  const igsid = document.getElementById('directIgsid').value.trim();
  if (!igsid) { toast('Введіть IGSID отримувача'); return; }

  state.directRecipient = igsid;
  document.getElementById('chatEmpty').style.display  = 'none';
  document.getElementById('chatThread').style.display = 'flex';
  document.getElementById('chatName').textContent     = 'IGSID: ' + igsid;
  document.getElementById('chatAvatar').src           = avatar(igsid);
  document.getElementById('btnBack').style.display    = 'block';
  document.getElementById('screen-messenger').classList.add('chat-open');
  document.getElementById('chatMessages').innerHTML   = '<div class="empty">Надішліть повідомлення</div>';
}

// ── SEND ─────────────────────────────────────────────────────────────────
async function sendReply() {
  const input = document.getElementById('replyInput');
  const text  = input.value.trim();
  if (!text) return;

  // Recipient: from conversation or direct input
  var recipientId = null;
  var conv = null;
  if (state.activeConvIdx !== null) {
    conv = state.convs[state.activeConvIdx];
    recipientId = conv ? conv.participantId : null;
  }
  if (!recipientId) recipientId = state.directRecipient;
  if (!recipientId) { toast('Не вдалося визначити отримувача'); return; }

  const btn = document.getElementById('btnSend');
  btn.disabled = true;

  try {
    const r = await fetch('/messenger/send.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        recipient_id: recipientId,
        message_text: text,
        token: state.token
      }),
    });
    const resp = await r.json();
    if (resp.error) throw new Error(typeof resp.error === 'object' ? resp.error.message : resp.error);

    input.value = ''; input.style.height = 'auto';

    // Add to UI
    const el = document.getElementById('chatMessages');
    // Clear "Надішліть повідомлення" placeholder
    if (el.querySelector('.empty')) el.innerHTML = '';
    el.insertAdjacentHTML('beforeend',
      '<div class="msg-row out">' +
      '<img src="' + esc(document.getElementById('igAvatar').src) + '" alt="">' +
      '<div class="msg-bubble">' + renderMsg(text) + '</div>' +
      '<div class="msg-time">щойно</div></div>'
    );
    el.scrollTop = el.scrollHeight;

    if (conv) {
      conv.lastMsg = text.substring(0, 48);
      conv.lastTime = 'щойно';
      renderConvList();
    }
  } catch(e) {
    toast('Помилка: ' + e.message);
  }
  btn.disabled = false;
}

document.addEventListener('DOMContentLoaded', initAuth);
</script>
</body>
</html>
